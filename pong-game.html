<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        #gameCanvas {
            background-color: #0f3460;
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            display: block;
            cursor: none;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 400px;
            background: rgba(0, 255, 136, 0.1);
            padding: 15px;
            border: 2px solid #00ff88;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .score-section {
            text-align: center;
            color: #00ff88;
        }

        .score-label {
            font-size: 0.9em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }

        .instructions {
            color: #00ff88;
            text-align: center;
            font-size: 0.9em;
            max-width: 500px;
            line-height: 1.6;
        }

        .instructions p {
            margin: 5px 0;
        }

        .key-binding {
            font-weight: bold;
            color: #ffff00;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 PONG 🎮</h1>
        <div class="scoreboard">
            <div class="score-section">
                <div class="score-label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-section">
                <div class="score-label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><span class="key-binding">↑ ↓ Keys</span> or <span class="key-binding">Mouse Move</span> - Control Left Paddle</p>
            <p>First to 11 points wins! Computer controls the right paddle.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Objects
        const paddle = {
            width: 10,
            height: 80,
            speed: 6,
            x: 20,
            y: canvas.height / 2 - 40
        };

        const computerPaddle = {
            width: 10,
            height: 80,
            speed: 5,
            x: canvas.width - 30,
            y: canvas.height / 2 - 40
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            speedX: 5,
            speedY: 5,
            maxSpeed: 8
        };

        let playerScore = 0;
        let computerScore = 0;

        // Input handling
        const keys = {};
        let mouseY = canvas.height / 2;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Update Functions
        function updatePaddle() {
            // Player paddle - responds to both mouse and arrow keys
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                paddle.y = Math.max(0, paddle.y - paddle.speed);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                paddle.y = Math.min(canvas.height - paddle.height, paddle.y + paddle.speed);
            }

            // Mouse control
            const mouseDiff = mouseY - (paddle.y + paddle.height / 2);
            if (Math.abs(mouseDiff) > 5) {
                paddle.y += mouseDiff * 0.1;
                paddle.y = Math.max(0, Math.min(canvas.height - paddle.height, paddle.y));
            }
        }

        function updateComputerPaddle() {
            const computerCenter = computerPaddle.y + computerPaddle.height / 2;
            const ballCenter = ball.y;

            // AI logic with slight imperfection
            const difficulty = 0.08;
            if (computerCenter < ballCenter - 35) {
                computerPaddle.y += computerPaddle.speed;
            } else if (computerCenter > ballCenter + 35) {
                computerPaddle.y -= computerPaddle.speed;
            }

            // Keep paddle in bounds
            computerPaddle.y = Math.max(0, Math.min(canvas.height - computerPaddle.height, computerPaddle.y));
        }

        function updateBall() {
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.speedY = -ball.speedY;
            }
            if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.speedY = -ball.speedY;
            }

            // Ball collision with left paddle
            if (
                ball.x - ball.radius < paddle.x + paddle.width &&
                ball.y > paddle.y &&
                ball.y < paddle.y + paddle.height
            ) {
                ball.x = paddle.x + paddle.width + ball.radius;
                ball.speedX = -ball.speedX;

                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (paddle.y + paddle.height / 2)) / (paddle.height / 2);
                ball.speedY = hitPos * ball.maxSpeed;
                ball.speedX = Math.abs(ball.speedX);
            }

            // Ball collision with right paddle
            if (
                ball.x + ball.radius > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                ball.x = computerPaddle.x - ball.radius;
                ball.speedX = -ball.speedX;

                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computerPaddle.y + computerPaddle.height / 2)) / (computerPaddle.height / 2);
                ball.speedY = hitPos * ball.maxSpeed;
                ball.speedX = -Math.abs(ball.speedX);
            }

            // Ball goes out of bounds
            if (ball.x < 0) {
                computerScore++;
                resetBall();
            }
            if (ball.x > canvas.width) {
                playerScore++;
                resetBall();
            }

            // Update score display
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.speedY = (Math.random() - 0.5) * 5;
        }

        // Draw Functions
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawRect(paddle.x, paddle.y, paddle.width, paddle.height, '#00ff88');
            drawRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height, '#00ff88');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.radius, '#ffff00');

            // Draw border
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        // Game Loop
        function gameLoop() {
            updatePaddle();
            updateComputerPaddle();
            updateBall();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
