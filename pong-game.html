<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00cc6f);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .btn-start:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.8);
            transform: scale(1.05);
        }

        .btn-start.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
        }

        .btn-start.active:hover {
            box-shadow: 0 0 25px rgba(255, 107, 107, 0.8);
        }

        .btn-reset {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
        }

        .btn-reset:hover {
            box-shadow: 0 0 25px rgba(255, 107, 107, 0.8);
            transform: scale(1.05);
        }

        .timers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .timer-card {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            transition: all 0.3s ease;
        }

        .timer-card:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: translateY(-5px);
        }

        .timer-card.running {
            background: rgba(255, 107, 107, 0.1);
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }

        .timer-card.finished {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .timer-number {
            color: #00ff88;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .timer-display {
            color: #00ff88;
            font-size: 2.5em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ff88;
            margin: 15px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-card.running .timer-display {
            color: #ff6b6b;
            text-shadow: 0 0 10px #ff6b6b;
        }

        .timer-card.finished .timer-display {
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }

        .timer-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 5px;
            font-size: 0.9em;
            text-align: center;
        }

        .timer-input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .timer-input::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        .timer-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .timer-btn {
            flex: 1;
            padding: 8px;
            font-size: 0.8em;
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timer-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }

        .timer-btn.running {
            background: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            border-color: #ff6b6b;
        }

        .timer-btn.running:hover {
            background: rgba(255, 107, 107, 0.5);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
            margin: 10px auto;
        }

        .status-indicator.running {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }

        .status-indicator.finished {
            background: #ffd700;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Timer Dashboard</h1>
        
        <div class="controls">
            <button class="btn-start" id="startAllBtn">Start All</button>
            <button class="btn-reset" id="resetAllBtn">Reset All</button>
        </div>

        <div class="timers-grid" id="timersGrid"></div>
    </div>

    <script>
        const TIMER_COUNT = 10;
        const timers = [];
        let allRunning = false;

        class Timer {
            constructor(id) {
                this.id = id;
                this.duration = 60; // Default 60 seconds
                this.remaining = 60;
                this.isRunning = false;
                this.intervalId = null;
                this.element = null;
                this.createElement();
            }

            createElement() {
                const card = document.createElement('div');
                card.className = 'timer-card';
                card.innerHTML = `
                    <div class="timer-number">Timer ${this.id + 1}</div>
                    <input type="number" class="timer-input" placeholder="Seconds" value="60" min="1">
                    <div class="timer-display">01:00</div>
                    <div class="status-indicator"></div>
                    <div class="timer-controls">
                        <button class="timer-btn" data-action="start">Start</button>
                        <button class="timer-btn" data-action="reset">Reset</button>
                    </div>
                `;

                card.querySelector('input').addEventListener('change', (e) => {
                    if (!this.isRunning) {
                        this.duration = parseInt(e.target.value) || 60;
                        this.remaining = this.duration;
                        this.updateDisplay();
                    }
                });

                const startBtn = card.querySelector('[data-action="start"]');
                const resetBtn = card.querySelector('[data-action="reset"]');

                startBtn.addEventListener('click', () => this.toggleStart());
                resetBtn.addEventListener('click', () => this.reset());

                this.element = card;
                return card;
            }

            toggleStart() {
                if (this.isRunning) {
                    this.stop();
                } else {
                    this.start();
                }
                updateStartAllButton();
            }

            start() {
                if (this.isRunning || this.remaining <= 0) return;
                this.isRunning = true;
                this.updateDisplay();
                this.updateUI();

                this.intervalId = setInterval(() => {
                    this.remaining--;
                    this.updateDisplay();

                    if (this.remaining <= 0) {
                        this.stop();
                    }
                }, 1000);
            }

            stop() {
                this.isRunning = false;
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
                this.updateUI();
            }

            reset() {
                this.stop();
                this.remaining = this.duration;
                this.updateDisplay();
                this.updateUI();
            }

            updateDisplay() {
                const minutes = Math.floor(this.remaining / 60);
                const seconds = this.remaining % 60;
                const timeString = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                this.element.querySelector('.timer-display').textContent = timeString;
            }

            updateUI() {
                const startBtn = this.element.querySelector('[data-action="start"]');
                const input = this.element.querySelector('input');
                const indicator = this.element.querySelector('.status-indicator');

                if (this.isRunning) {
                    this.element.classList.add('running');
                    this.element.classList.remove('finished');
                    startBtn.textContent = 'Stop';
                    startBtn.classList.add('running');
                    input.disabled = true;
                    indicator.classList.add('running');
                } else if (this.remaining <= 0) {
                    this.element.classList.remove('running');
                    this.element.classList.add('finished');
                    startBtn.textContent = 'Start';
                    startBtn.classList.remove('running');
                    input.disabled = true;
                    indicator.classList.remove('running');
                    indicator.classList.add('finished');
                } else {
                    this.element.classList.remove('running', 'finished');
                    startBtn.textContent = 'Start';
                    startBtn.classList.remove('running');
                    input.disabled = false;
                    indicator.classList.remove('running', 'finished');
                }
            }
        }

        function initializeTimers() {
            const grid = document.getElementById('timersGrid');
            grid.innerHTML = '';

            for (let i = 0; i < TIMER_COUNT; i++) {
                const timer = new Timer(i);
                timers.push(timer);
                grid.appendChild(timer.element);
            }
        }

        function startAll() {
            const allRunning = timers.some(t => t.isRunning);
            if (allRunning) {
                timers.forEach(t => t.stop());
            } else {
                timers.forEach(t => {
                    if (t.remaining > 0 && !t.isRunning) {
                        t.start();
                    }
                });
            }
            updateStartAllButton();
        }

        function resetAll() {
            timers.forEach(t => t.reset());
            updateStartAllButton();
        }

        function updateStartAllButton() {
            const btn = document.getElementById('startAllBtn');
            const anyRunning = timers.some(t => t.isRunning);
            btn.textContent = anyRunning ? 'Stop All' : 'Start All';
            btn.classList.toggle('active', anyRunning);
        }

        // Event listeners
        document.getElementById('startAllBtn').addEventListener('click', startAll);
        document.getElementById('resetAllBtn').addEventListener('click', resetAll);

        // Initialize
        initializeTimers();
    </script>
</body>
</html>
